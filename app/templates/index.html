<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center">📝 Task Manager</h2>

    <form action="/add" method="POST" class="d-flex mt-4 mb-4">
        <input type="text" name="title" class="form-control me-2" placeholder="Enter task..." required>
        <button class="btn btn-primary">Add</button>
    </form>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Task</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task[0] }}</td>
                <td>{{ task[1] }}</td>
                <td>
                    {% if task[2] == 'Completed' %}
                        <span class="badge bg-success">Completed</span>
                    {% else %}
                        <span class="badge bg-warning text-dark">Pending</span>
                    {% endif %}
                </td>

                <td>
                    <a href="/complete/{{ task[0] }}" class="btn btn-success btn-sm">Done</a>
                    <a href="/delete/{{ task[0] }}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this task?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
