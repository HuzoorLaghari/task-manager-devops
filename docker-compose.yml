version: "3.9"

services:

  app:
    build: .
    container_name: task_manager_app
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./app/database:/app/database
    networks:
      - webnet

  nginx:
    image: nginx:latest
    container_name: task_manager_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
